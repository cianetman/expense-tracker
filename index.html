<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="พอร์ตของฉัน">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f172a'/%3E%3Ctext x='90' y='120' font-size='100' text-anchor='middle' fill='%2360a5fa'%3E📊%3C/text%3E%3C/svg%3E">
<title>พอร์ตของฉัน v3</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface-2: #334155;
    --border: rgba(148, 163, 184, 0.15);
    --text: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
    --accent: #60a5fa; --green: #4ade80; --red: #f87171;
    --amber: #fbbf24;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Sukhumvit Set", sans-serif;
    font-size: 15px; line-height: 1.5; min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 80px; }
  .lock-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .lock-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 30px 24px;
    width: 100%; max-width: 360px; text-align: center;
  }
  .lock-box h2 { margin: 0 0 8px; font-size: 22px; }
  .lock-box p { color: var(--text-muted); font-size: 13px; margin: 0 0 18px; }
  .lock-box input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; color: var(--text); font-size: 16px;
    text-align: center; margin-bottom: 12px; font-family: inherit;
  }
  .lock-box input:focus { outline: none; border-color: var(--accent); }
  .lock-box button {
    width: 100%; padding: 12px; background: var(--accent); color: #0f172a;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .lock-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }
  .version-tag {
    position: fixed; top: 5px; right: 5px;
    font-size: 9px; color: var(--text-dim);
    background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px;
    z-index: 250;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; gap: 8px;
  }
  .header h1 { font-size: 22px; font-weight: 600; margin: 0; }
  .header-btns { display: flex; gap: 6px; }
  .icon-button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; transition: transform 0.3s;
  }
  .icon-button.spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Big sync status bar */
  .sync-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 10px; margin-bottom: 12px;
    font-size: 12px; font-weight: 500;
    border: 1px solid;
  }
  .sync-bar.ok { background: rgba(74, 222, 128, 0.1); border-color: rgba(74, 222, 128, 0.3); color: var(--green); }
  .sync-bar.pending { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.3); color: var(--amber); }
  .sync-bar.err { background: rgba(248, 113, 113, 0.1); border-color: rgba(248, 113, 113, 0.3); color: var(--red); }
  .sync-info { font-size: 10px; opacity: 0.8; font-weight: 400; }

  .price-info {
    font-size: 11px; color: var(--text-dim); text-align: center;
    margin-bottom: 12px;
  }
  .total-card {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .total-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
  .total-value-thb { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }
  .total-value-usd { font-size: 16px; color: var(--text-muted); margin-top: 2px; }
  .total-pnl {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; font-size: 14px;
  }
  .pnl-positive { color: var(--green); }
  .pnl-negative { color: var(--red); }
  .tabs {
    display: flex; gap: 6px; margin-bottom: 16px; background: var(--surface);
    padding: 4px; border-radius: 10px; border: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; padding: 8px 10px; text-align: center; border-radius: 7px;
    font-size: 13px; color: var(--text-muted); cursor: pointer;
    white-space: nowrap; transition: all 0.2s; min-width: fit-content;
  }
  .tab.active { background: var(--surface-2); color: var(--text); font-weight: 500; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin: 16px 0 10px;
  }
  .section-title { font-size: 15px; font-weight: 600; }
  .add-btn {
    background: var(--accent); color: #0f172a; border: none;
    padding: 6px 12px; border-radius: 8px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }

  /* === ASSET CARD — NEW LAYOUT === */
  .asset-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
  }
  .asset-top {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px;
  }
  .asset-symbol { font-weight: 600; font-size: 16px; }
  .asset-type-tag {
    font-size: 10px; font-weight: 400; color: var(--text-dim);
    margin-left: 6px;
  }
  .asset-value-main { font-weight: 600; font-size: 16px; text-align: right; }

  .asset-mid {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 2px;
  }
  .asset-market-price {
    font-size: 13px; color: var(--text); font-weight: 500;
  }
  .asset-pnl-small {
    font-size: 12px;
  }

  .asset-bottom {
    font-size: 11px; color: var(--text-muted);
    margin-top: 6px;
  }
  .asset-note {
    font-size: 11px; color: var(--text-muted);
    font-style: italic; margin-top: 4px;
  }

  .asset-actions {
    display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .small-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 5px 10px; border-radius: 6px;
    font-size: 12px; cursor: pointer; flex: 1;
  }
  .small-btn:active { background: var(--surface-2); }
  .small-btn.danger { color: var(--red); }

  .empty {
    text-align: center; color: var(--text-muted); padding: 24px 16px;
    font-size: 13px; background: var(--surface); border-radius: var(--radius);
    border: 1px dashed var(--border);
  }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 100; padding: 16px;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: 16px; width: 100%;
    max-width: 460px; padding: 20px; max-height: 90vh; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .modal h2 { font-size: 18px; margin: 0 0 16px; font-weight: 600; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 12px; color: var(--text-muted);
    margin-bottom: 6px; font-weight: 500;
  }
  .form-group input, .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px;
    font-family: inherit; -webkit-appearance: none; appearance: none;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: #0f172a; }
  .btn-secondary { background: var(--surface-2); color: var(--text); }
  .chart-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .chart-wrap { position: relative; height: 220px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 12px;
    font-size: 12px; color: var(--text-muted);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 6px;
    font-size: 13px; display: flex; justify-content: space-between;
  }
  .history-action { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); color: var(--text); padding: 10px 18px;
    border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; border: 1px solid var(--border);
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="version-tag">v3.0</div>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <h2>🔒 พอร์ตของฉัน</h2>
    <p>ใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="lockInput" placeholder="รหัสผ่าน" autocomplete="off">
    <button onclick="tryUnlock()">เข้าสู่ระบบ</button>
    <div class="lock-err" id="lockErr"></div>
    <p style="font-size:11px;margin-top:16px;color:var(--text-dim)">รหัสเริ่มต้น: changeme123</p>
  </div>
</div>

<div class="app" id="mainApp" style="display:none;">
  <div class="header">
    <h1>📊 พอร์ตของฉัน</h1>
    <div class="header-btns">
      <button class="icon-button" id="syncBtn" onclick="manualSync()" title="ดึงข้อมูลจาก cloud" aria-label="Sync">⇅</button>
      <button class="icon-button" id="refreshBtn" onclick="updatePrices()" title="รีเฟรชราคา" aria-label="รีเฟรช">↻</button>
    </div>
  </div>

  <!-- BIG sync status -->
  <div class="sync-bar pending" id="syncBar">
    <span id="syncIcon">⏳ กำลังเชื่อมต่อ cloud...</span>
    <span class="sync-info" id="syncInfo"></span>
  </div>

  <div class="price-info" id="priceInfo">ยังไม่ได้อัพเดตราคา</div>

  <div class="total-card">
    <div class="total-label">มูลค่ารวมทั้งหมด</div>
    <div class="total-value-thb" id="totalTHB">฿0</div>
    <div class="total-value-usd" id="totalUSD">$0</div>
    <div class="total-pnl">
      <span>กำไร/ขาดทุนรวม</span>
      <span id="totalPnL">฿0 (0.00%)</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="all" onclick="switchTab('all')">ทั้งหมด</div>
    <div class="tab" data-tab="th_stock" onclick="switchTab('th_stock')">หุ้นไทย</div>
    <div class="tab" data-tab="us_stock" onclick="switchTab('us_stock')">หุ้นนอก</div>
    <div class="tab" data-tab="crypto" onclick="switchTab('crypto')">คริปโต</div>
    <div class="tab" data-tab="stable" onclick="switchTab('stable')">USDT</div>
    <div class="tab" data-tab="chart" onclick="switchTab('chart')">📈</div>
    <div class="tab" data-tab="history" onclick="switchTab('history')">📜</div>
  </div>

  <div id="content"></div>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2 id="modalTitle">เพิ่มสินทรัพย์</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>ประเภท</label>
      <select id="assetType">
        <option value="th_stock">หุ้นไทย (SET)</option>
        <option value="us_stock">หุ้นต่างประเทศ (US)</option>
        <option value="crypto">คริปโตเคอเรนซี</option>
        <option value="stable">USDT / Stablecoin</option>
      </select>
    </div>
    <div class="form-group">
      <label>สัญลักษณ์ <span id="symbolHint" style="color:var(--text-dim);font-size:11px;"></span></label>
      <input type="text" id="assetSymbol" placeholder="เช่น PTT, AAPL, BTC" autocapitalize="characters">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>จำนวน</label>
        <input type="number" id="assetQty" step="any" inputmode="decimal" placeholder="0">
      </div>
      <div class="form-group">
        <label>ราคาต้นทุน/หน่วย</label>
        <input type="number" id="assetCost" step="any" inputmode="decimal" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>หมายเหตุ (ถ้ามี)</label>
      <input type="text" id="assetNote" placeholder="">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveAsset()">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ============ CONFIG ============
const JSONBIN_KEY = '$2a$10$fX.6irZRsdMC./8UCsTF0uqPsSHPWGS6fCOq4ofjo/IHFlIRBxmRO';
const APP_PASSWORD = 'changeme123';
// ============================

const BIN_ID_KEY = 'portfolio_bin_id_v1';
const PASSWORD_OK_KEY = 'portfolio_pw_ok_v1';
const CACHE_KEY = 'portfolio_cache_v3';

let binId = localStorage.getItem(BIN_ID_KEY) || null;

let state = {
  assets: [], history: [], prices: {},
  fxRate: 36, fxUpdatedAt: null,
  lastUpdated: null, lastSyncedAt: null,
  syncStatus: 'pending', currentTab: 'all', version: 0
};

const TYPE_LABEL = { th_stock: 'หุ้นไทย', us_stock: 'หุ้นนอก', crypto: 'คริปโต', stable: 'Stablecoin' };
const TYPE_COLOR = { th_stock: '#60a5fa', us_stock: '#a78bfa', crypto: '#fbbf24', stable: '#4ade80' };

function checkLock() {
  if (localStorage.getItem(PASSWORD_OK_KEY) === '1') showApp();
  else document.getElementById('lockInput').focus();
}
function tryUnlock() {
  const v = document.getElementById('lockInput').value;
  if (v === APP_PASSWORD) {
    localStorage.setItem(PASSWORD_OK_KEY, '1');
    showApp();
  } else {
    document.getElementById('lockErr').textContent = 'รหัสผ่านไม่ถูกต้อง';
    document.getElementById('lockInput').value = '';
  }
}
document.getElementById('lockInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryUnlock();
});
function showApp() {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  initApp();
}

// ============ JSONBin ============
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

async function createBin() {
  console.log('[Sync] Creating new bin...');
  try {
    const res = await fetch(`${JSONBIN_BASE}/b`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY,
        'X-Bin-Name': 'portfolio',
        'X-Bin-Private': 'true'
      },
      body: JSON.stringify({ assets: [], history: [], prices: {}, fxRate: 36, version: 0 })
    });
    const data = await res.json();
    if (data?.metadata?.id) {
      binId = data.metadata.id;
      localStorage.setItem(BIN_ID_KEY, binId);
      console.log('[Sync] Bin created:', binId);
      toast('🆕 สร้าง cloud bin ใหม่: ' + binId.slice(0, 8) + '...');
      return true;
    }
    console.error('[Sync] Bin create failed', data);
  } catch(e) { console.error('[Sync] Create bin error', e); }
  return false;
}

async function pullFromCloud(silent) {
  console.log('[Sync] Pulling from cloud, binId =', binId);
  if (!binId) {
    setSyncStatus('pending');
    const created = await createBin();
    if (!created) { setSyncStatus('err', 'สร้าง bin ไม่สำเร็จ'); return false; }
    setSyncStatus('ok');
    return true;
  }
  try {
    setSyncStatus('pending');
    const res = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    console.log('[Sync] Pull response:', res.status);
    if (!res.ok) {
      // ถ้า bin หาย (404) สร้างใหม่
      if (res.status === 404) {
        console.warn('[Sync] Bin not found, recreating...');
        localStorage.removeItem(BIN_ID_KEY);
        binId = null;
        return await pullFromCloud(silent);
      }
      throw new Error('HTTP ' + res.status);
    }
    const data = await res.json();
    const record = data.record;
    if (record) {
      const localVersion = state.version || 0;
      const cloudVersion = record.version || 0;
      console.log('[Sync] Versions: local=', localVersion, 'cloud=', cloudVersion);
      if (cloudVersion >= localVersion) {
        state.assets = record.assets || [];
        state.history = record.history || [];
        state.prices = record.prices || {};
        state.fxRate = record.fxRate || 36;
        state.version = cloudVersion;
        saveLocal();
        if (!silent) toast('⬇️ ดึงข้อมูลจาก cloud (' + state.assets.length + ' รายการ)');
      } else {
        console.log('[Sync] Local newer, pushing instead');
        await pushToCloud();
        return true;
      }
    }
    state.lastSyncedAt = Date.now();
    setSyncStatus('ok');
    return true;
  } catch(e) {
    console.error('[Sync] Pull failed', e);
    setSyncStatus('err', e.message);
    if (!silent) toast('❌ โหลดจาก cloud ล้มเหลว');
    return false;
  }
}

let pushTimeout = null;
function schedulePush() {
  if (pushTimeout) clearTimeout(pushTimeout);
  setSyncStatus('pending', 'กำลังบันทึก...');
  pushTimeout = setTimeout(pushToCloud, 1500);
}

async function pushToCloud() {
  console.log('[Sync] Pushing to cloud, binId =', binId);
  if (!binId) {
    const created = await createBin();
    if (!created) { setSyncStatus('err'); return false; }
  }
  try {
    setSyncStatus('pending', 'กำลังบันทึก...');
    state.version = (state.version || 0) + 1;
    const payload = {
      assets: state.assets, history: state.history, prices: state.prices,
      fxRate: state.fxRate, version: state.version, updatedAt: Date.now()
    };
    console.log('[Sync] Pushing version', state.version, 'with', state.assets.length, 'assets');
    const res = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify(payload)
    });
    console.log('[Sync] Push response:', res.status);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.lastSyncedAt = Date.now();
    saveLocal();
    setSyncStatus('ok');
    return true;
  } catch(e) {
    console.error('[Sync] Push failed', e);
    setSyncStatus('err', e.message);
    return false;
  }
}

function setSyncStatus(s, msg) {
  state.syncStatus = s;
  const bar = document.getElementById('syncBar');
  const icon = document.getElementById('syncIcon');
  const info = document.getElementById('syncInfo');
  if (!bar) return;
  bar.classList.remove('ok', 'pending', 'err');
  bar.classList.add(s);
  const binText = binId ? `bin: ${binId.slice(0,8)}...` : 'ยังไม่มี bin';
  if (s === 'ok') {
    icon.textContent = '☁️ เชื่อมต่อ cloud แล้ว — ข้อมูล sync อัตโนมัติ';
    info.textContent = state.lastSyncedAt ? `อัพเดต ${formatTimeShort(state.lastSyncedAt)}` : binText;
  } else if (s === 'pending') {
    icon.textContent = '⏳ ' + (msg || 'กำลังเชื่อมต่อ cloud...');
    info.textContent = binText;
  } else {
    icon.textContent = '⚠️ Sync error: ' + (msg || 'ไม่สามารถเชื่อมต่อได้');
    info.textContent = binText;
  }
}

async function manualSync() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');
  await pullFromCloud(false);
  render();
  btn.classList.remove('spinning');
}

// ============ LOCAL CACHE ============
function saveLocal() {
  localStorage.setItem(CACHE_KEY, JSON.stringify({
    assets: state.assets, history: state.history, prices: state.prices,
    fxRate: state.fxRate, version: state.version, lastUpdated: state.lastUpdated
  }));
}
function loadLocal() {
  try {
    const d = localStorage.getItem(CACHE_KEY);
    if (d) {
      const p = JSON.parse(d);
      state.assets = p.assets || [];
      state.history = p.history || [];
      state.prices = p.prices || {};
      state.fxRate = p.fxRate || 36;
      state.version = p.version || 0;
      state.lastUpdated = p.lastUpdated || null;
    }
  } catch(e) {}
}
function addHistory(action, detail) {
  state.history.push({ ts: Date.now(), action, detail });
  if (state.history.length > 100) state.history = state.history.slice(-100);
}

// ============ PRICE FETCH ============
async function fetchPrice(asset) {
  try {
    if (asset.type === 'crypto') {
      const id = mapCryptoId(asset.symbol);
      const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
      const data = await res.json();
      if (data[id]?.usd) return { price: data[id].usd, currency: 'USD' };
    } else if (asset.type === 'stable') {
      return { price: 1, currency: 'USD' };
    } else if (asset.type === 'us_stock') {
      const sym = asset.symbol.toUpperCase();
      const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d`);
      const data = await res.json();
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price) return { price, currency: 'USD' };
    } else if (asset.type === 'th_stock') {
      const sym = asset.symbol.toUpperCase() + '.BK';
      const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d`);
      const data = await res.json();
      const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if (price) return { price, currency: 'THB' };
    }
  } catch(e) { console.warn('Fetch failed', asset.symbol, e); }
  return null;
}
function mapCryptoId(symbol) {
  const map = {
    BTC: 'bitcoin', ETH: 'ethereum', BNB: 'binancecoin', SOL: 'solana',
    XRP: 'ripple', ADA: 'cardano', DOGE: 'dogecoin', AVAX: 'avalanche-2',
    DOT: 'polkadot', MATIC: 'matic-network', LINK: 'chainlink', LTC: 'litecoin',
    TRX: 'tron', UNI: 'uniswap', ATOM: 'cosmos', XLM: 'stellar',
    NEAR: 'near', APT: 'aptos', ARB: 'arbitrum', OP: 'optimism',
    SUI: 'sui', PEPE: 'pepe', SHIB: 'shiba-inu', WIF: 'dogwifcoin'
  };
  return map[symbol.toUpperCase()] || symbol.toLowerCase();
}
async function fetchFxRate() {
  try {
    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await res.json();
    if (data?.rates?.THB) {
      state.fxRate = data.rates.THB;
      state.fxUpdatedAt = Date.now();
    }
  } catch(e) {}
}
async function updatePrices() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await fetchFxRate();
  await Promise.all(state.assets.map(async (a) => {
    const r = await fetchPrice(a);
    if (r) {
      const key = `${a.type}_${a.symbol.toUpperCase()}`;
      state.prices[key] = { ...r, updatedAt: Date.now() };
    }
  }));
  state.lastUpdated = Date.now();
  saveLocal();
  schedulePush();
  render();
  btn.classList.remove('spinning');
}

// ============ CALCULATIONS ============
function getCurrentPriceTHB(a) {
  const key = `${a.type}_${a.symbol.toUpperCase()}`;
  const p = state.prices[key];
  if (!p) return null;
  if (p.currency === 'THB') return p.price;
  return p.price * state.fxRate;
}
function getCurrentValueTHB(a) {
  const p = getCurrentPriceTHB(a);
  if (p === null) return null;
  return p * a.qty;
}
function getCostTHB(a) {
  if (a.type === 'th_stock') return a.cost * a.qty;
  return a.cost * a.qty * state.fxRate;
}
function formatTHB(n) {
  if (n === null || isNaN(n)) return '฿—';
  return '฿' + Math.round(n).toLocaleString('th-TH');
}
function formatUSD(n) {
  if (n === null || isNaN(n)) return '$—';
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
}
function formatPnL(pnl, pct) {
  if (pnl === null || isNaN(pnl)) return '<span style="color:var(--text-dim)">รอข้อมูล</span>';
  const cls = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
  const sign = pnl >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${formatTHB(pnl)} (${sign}${pct.toFixed(2)}%)</span>`;
}
function formatPnLSmall(pnl, pct) {
  if (pnl === null || isNaN(pnl)) return '<span style="color:var(--text-dim);font-size:11px">รอข้อมูล</span>';
  const cls = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
  const sign = pnl >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${formatTHB(pnl)} (${sign}${pct.toFixed(2)}%)</span>`;
}
function formatTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
}
function formatTimeShort(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function formatNum(n) {
  if (n === null || isNaN(n)) return '—';
  if (n >= 100) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
  return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ============ RENDER ============
function renderPriceInfo() {
  const txt = state.lastUpdated
    ? `อัพเดตราคา: ${formatTime(state.lastUpdated)} | 1 USD = ${state.fxRate.toFixed(2)} ฿`
    : 'แตะปุ่ม ↻ เพื่ออัพเดตราคา';
  document.getElementById('priceInfo').textContent = txt;
}
function render() {
  let totalValueTHB = 0, totalCostTHB = 0;
  state.assets.forEach(a => {
    const v = getCurrentValueTHB(a);
    const c = getCostTHB(a);
    totalValueTHB += (v !== null ? v : c);
    totalCostTHB += c;
  });
  const pnl = totalValueTHB - totalCostTHB;
  const pct = totalCostTHB > 0 ? (pnl / totalCostTHB * 100) : 0;
  document.getElementById('totalTHB').textContent = formatTHB(totalValueTHB);
  document.getElementById('totalUSD').textContent = formatUSD(totalValueTHB / state.fxRate);
  document.getElementById('totalPnL').innerHTML = formatPnL(pnl, pct);
  renderPriceInfo();
  setSyncStatus(state.syncStatus); // refresh sync bar

  const c = document.getElementById('content');
  if (state.currentTab === 'chart') renderChart(c);
  else if (state.currentTab === 'history') renderHistory(c);
  else renderAssetList(c, state.currentTab);
}

function renderAssetList(container, filter) {
  const assets = filter === 'all' ? state.assets : state.assets.filter(a => a.type === filter);
  let html = `<div class="section-header">
    <div class="section-title">${filter === 'all' ? 'สินทรัพย์ทั้งหมด' : TYPE_LABEL[filter]}
      <span style="color:var(--text-muted);font-weight:400;font-size:13px;">(${assets.length})</span>
    </div>
    <button class="add-btn" onclick="openAddModal('${filter === 'all' ? '' : filter}')">+ เพิ่ม</button>
  </div>`;

  if (assets.length === 0) {
    html += `<div class="empty">ยังไม่มีรายการ แตะ "+ เพิ่ม" เพื่อเริ่มต้น</div>`;
  } else {
    const sorted = [...assets].sort((a, b) => {
      const va = getCurrentValueTHB(a) ?? getCostTHB(a);
      const vb = getCurrentValueTHB(b) ?? getCostTHB(b);
      return vb - va;
    });
    sorted.forEach(asset => {
      const curVal = getCurrentValueTHB(asset);
      const costVal = getCostTHB(asset);
      const p = curVal !== null ? curVal - costVal : null;
      const pp = costVal > 0 && p !== null ? (p / costVal * 100) : 0;
      const pkey = `${asset.type}_${asset.symbol.toUpperCase()}`;
      const priceObj = state.prices[pkey];
      const nativeP = priceObj?.price ?? null;
      const nativeCur = priceObj?.currency || (asset.type === 'th_stock' ? 'THB' : 'USD');
      const curSymbol = nativeCur === 'THB' ? '฿' : '$';

      // === NEW LAYOUT ===
      // บนสุด: SYMBOL [tag]              ฿มูลค่าปัจจุบัน
      // กลาง: ราคาตลาด ฿X.XX            +/-กำไรขาดทุน (เล็ก)
      // ล่าง: จำนวน × ต้นทุน
      html += `<div class="asset-card">
        <div class="asset-top">
          <div><span class="asset-symbol">${escapeHtml(asset.symbol.toUpperCase())}</span><span class="asset-type-tag">${TYPE_LABEL[asset.type]}</span></div>
          <div class="asset-value-main">${curVal !== null ? formatTHB(curVal) : formatTHB(costVal)}</div>
        </div>
        <div class="asset-mid">
          <div class="asset-market-price">${nativeP !== null ? `ราคาตลาด: ${formatNum(nativeP)} ${curSymbol}` : '<span style="color:var(--text-dim)">รอข้อมูลราคา</span>'}</div>
          <div class="asset-pnl-small">${formatPnLSmall(p, pp)}</div>
        </div>
        <div class="asset-bottom">${asset.qty} × ${formatNum(asset.cost)} ${curSymbol} (ต้นทุน)</div>
        ${asset.note ? `<div class="asset-note">📝 ${escapeHtml(asset.note)}</div>` : ''}
        <div class="asset-actions">
          <button class="small-btn" onclick="adjustQty('${asset.id}', 'add')">+ เพิ่ม</button>
          <button class="small-btn" onclick="adjustQty('${asset.id}', 'sub')">− ลด</button>
          <button class="small-btn" onclick="openEditModal('${asset.id}')">✎ แก้</button>
          <button class="small-btn danger" onclick="deleteAsset('${asset.id}')">🗑</button>
        </div>
      </div>`;
    });
  }
  container.innerHTML = html;
}

function renderChart(container) {
  const byType = { th_stock: 0, us_stock: 0, crypto: 0, stable: 0 };
  let total = 0;
  state.assets.forEach(a => {
    const v = getCurrentValueTHB(a) ?? getCostTHB(a);
    byType[a.type] += v;
    total += v;
  });
  let html = `<div class="chart-container">
    <div class="chart-title">สัดส่วนพอร์ตตามประเภท</div>
    <div class="chart-wrap"><canvas id="pieChart" role="img" aria-label="สัดส่วนสินทรัพย์"></canvas></div>
    <div class="legend">`;
  Object.entries(byType).forEach(([t, v]) => {
    if (v > 0) {
      const pct = total > 0 ? (v / total * 100).toFixed(1) : 0;
      html += `<span class="legend-item"><span class="legend-dot" style="background:${TYPE_COLOR[t]}"></span>${TYPE_LABEL[t]} ${pct}%</span>`;
    }
  });
  html += `</div></div>
    <div class="chart-container">
      <div class="chart-title">รายตัว Top 10</div>
      <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="สินทรัพย์รายตัว"></canvas></div>
    </div>`;
  container.innerHTML = html;
  const labels = [], data = [], colors = [];
  Object.entries(byType).forEach(([t, v]) => {
    if (v > 0) { labels.push(TYPE_LABEL[t]); data.push(Math.round(v)); colors.push(TYPE_COLOR[t]); }
  });
  if (data.length > 0) {
    new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ฿${ctx.parsed.toLocaleString()}` } }
        }
      }
    });
  }
  const inds = state.assets.map(a => ({
    label: a.symbol.toUpperCase(),
    value: getCurrentValueTHB(a) ?? getCostTHB(a),
    type: a.type
  })).sort((a,b) => b.value - a.value).slice(0, 10);
  if (inds.length > 0) {
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: inds.map(i => i.label),
        datasets: [{
          data: inds.map(i => Math.round(i.value)),
          backgroundColor: inds.map(i => TYPE_COLOR[i.type]),
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `฿${ctx.parsed.x.toLocaleString()}` } } },
        scales: {
          x: { ticks: { color: '#94a3b8', callback: v => '฿' + (v/1000).toFixed(0) + 'k' }, grid: { color: 'rgba(148,163,184,0.1)' } },
          y: { ticks: { color: '#f1f5f9' }, grid: { display: false } }
        }
      }
    });
  }
}

function renderHistory(container) {
  let html = `<div class="section-header">
    <div class="section-title">ประวัติการเปลี่ยนแปลง</div>
    <button class="add-btn" style="background:var(--surface-2);color:var(--text)" onclick="clearHistory()">ลบทั้งหมด</button>
  </div>`;
  if (state.history.length === 0) {
    html += `<div class="empty">ยังไม่มีประวัติ</div>`;
  } else {
    [...state.history].reverse().forEach(h => {
      html += `<div class="history-item">
        <div><div>${escapeHtml(h.detail)}</div><div class="history-action">${h.action}</div></div>
        <div style="color:var(--text-dim);font-size:11px;white-space:nowrap;margin-left:8px;">${formatTime(h.ts)}</div>
      </div>`;
    });
  }
  container.innerHTML = html;
}

// ============ ACTIONS ============
function switchTab(name) {
  state.currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  render();
}
function openAddModal(presetType) {
  document.getElementById('modalTitle').textContent = 'เพิ่มสินทรัพย์';
  document.getElementById('editId').value = '';
  document.getElementById('assetType').value = presetType || 'th_stock';
  document.getElementById('assetSymbol').value = '';
  document.getElementById('assetQty').value = '';
  document.getElementById('assetCost').value = '';
  document.getElementById('assetNote').value = '';
  updateSymbolHint();
  document.getElementById('modal').classList.add('show');
}
function openEditModal(id) {
  const a = state.assets.find(x => x.id === id);
  if (!a) return;
  document.getElementById('modalTitle').textContent = 'แก้ไขสินทรัพย์';
  document.getElementById('editId').value = id;
  document.getElementById('assetType').value = a.type;
  document.getElementById('assetSymbol').value = a.symbol;
  document.getElementById('assetQty').value = a.qty;
  document.getElementById('assetCost').value = a.cost;
  document.getElementById('assetNote').value = a.note || '';
  updateSymbolHint();
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function updateSymbolHint() {
  const t = document.getElementById('assetType').value;
  const hints = {
    th_stock: '(เช่น PTT, CPALL, KBANK)',
    us_stock: '(เช่น AAPL, TSLA, NVDA)',
    crypto: '(เช่น BTC, ETH, SOL)',
    stable: '(เช่น USDT, USDC)'
  };
  document.getElementById('symbolHint').textContent = hints[t] || '';
}
document.getElementById('assetType').addEventListener('change', updateSymbolHint);

function saveAsset() {
  const id = document.getElementById('editId').value;
  const type = document.getElementById('assetType').value;
  const symbol = document.getElementById('assetSymbol').value.trim().toUpperCase();
  const qty = parseFloat(document.getElementById('assetQty').value);
  const cost = parseFloat(document.getElementById('assetCost').value);
  const note = document.getElementById('assetNote').value.trim();
  if (!symbol || !qty || qty <= 0 || isNaN(cost) || cost < 0) {
    alert('กรุณากรอกข้อมูลให้ครบ'); return;
  }
  if (id) {
    const i = state.assets.findIndex(x => x.id === id);
    if (i >= 0) {
      const old = state.assets[i];
      state.assets[i] = { ...old, type, symbol, qty, cost, note };
      addHistory('แก้ไข', `${symbol}: จำนวน ${old.qty}→${qty}, ต้นทุน ${old.cost}→${cost}`);
    }
  } else {
    state.assets.push({
      id: 'a_' + Date.now() + Math.random().toString(36).slice(2,6),
      type, symbol, qty, cost, note, createdAt: Date.now()
    });
    addHistory('เพิ่ม', `${symbol} (${TYPE_LABEL[type]}): ${qty} หน่วย @ ${cost}`);
  }
  saveLocal();
  schedulePush();
  closeModal();
  render();
  updatePrices();
}
function deleteAsset(id) {
  const a = state.assets.find(x => x.id === id);
  if (!a) return;
  if (!confirm(`ลบ ${a.symbol} จริงหรือไม่?`)) return;
  state.assets = state.assets.filter(x => x.id !== id);
  addHistory('ลบ', `${a.symbol} (${TYPE_LABEL[a.type]})`);
  saveLocal();
  schedulePush();
  render();
}
function adjustQty(id, mode) {
  const a = state.assets.find(x => x.id === id);
  if (!a) return;
  const txt = mode === 'add' ? `เพิ่มกี่หน่วย ${a.symbol}?` : `ลดกี่หน่วย ${a.symbol}?`;
  const amt = parseFloat(prompt(txt, ''));
  if (!amt || isNaN(amt) || amt <= 0) return;
  if (mode === 'add') {
    const newCost = parseFloat(prompt(`ราคาต้นทุนต่อหน่วยสำหรับ ${amt} หน่วยใหม่?`, a.cost));
    if (isNaN(newCost) || newCost < 0) return;
    const totalCost = a.qty * a.cost + amt * newCost;
    const newQty = a.qty + amt;
    const avg = totalCost / newQty;
    addHistory('เพิ่มจำนวน', `${a.symbol}: ${a.qty}→${newQty} (+${amt} @ ${newCost}), avg ${a.cost.toFixed(2)}→${avg.toFixed(2)}`);
    a.qty = newQty;
    a.cost = avg;
  } else {
    if (amt > a.qty) { alert('จำนวนที่ลดมากกว่าที่มี'); return; }
    addHistory('ลดจำนวน', `${a.symbol}: ${a.qty}→${a.qty - amt} (−${amt})`);
    a.qty -= amt;
    if (a.qty === 0 && confirm('จำนวนเหลือ 0 ลบรายการนี้?')) {
      state.assets = state.assets.filter(x => x.id !== a.id);
    }
  }
  saveLocal();
  schedulePush();
  render();
}
function clearHistory() {
  if (!confirm('ลบประวัติทั้งหมด?')) return;
  state.history = [];
  saveLocal();
  schedulePush();
  render();
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

async function initApp() {
  loadLocal();
  render();
  await pullFromCloud(true);
  render();
  if (state.assets.length > 0) {
    setTimeout(updatePrices, 300);
  }
}
document.addEventListener('visibilitychange', async () => {
  if (!document.hidden && document.getElementById('mainApp').style.display !== 'none') {
    await pullFromCloud(true);
    render();
    const stale = !state.lastUpdated || (Date.now() - state.lastUpdated > 60000);
    if (stale && state.assets.length > 0) updatePrices();
  }
});

checkLock();
