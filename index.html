<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกรายรับ-รายจ่าย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f7f8fb;
  --surface3: #eef1f6;
  --border: #e2e6ee;
  --text: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --income: #10b981;
  --income-bg: rgba(16,185,129,0.1);
  --expense: #ef4444;
  --expense-bg: rgba(239,68,68,0.08);
  --accent: #6366f1;
  --accent-bg: rgba(99,102,241,0.08);
  --yellow: #f59e0b;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --orange: #f97316;
  --purple: #8b5cf6;
  --lime: #84cc16;
  --rose: #f43f5e;
  --teal: #14b8a6;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0;
  margin-bottom: 8px;
}

.header h1 {
  font-family: 'Kanit', sans-serif;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.header-sub {
  font-size: 13px;
  color: var(--text3);
}

/* Summary Cards */
.summary-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.summary-card.balance::before { background: linear-gradient(90deg, var(--accent), var(--cyan)); }
.summary-card.income-card::before { background: var(--income); }
.summary-card.expense-card::before { background: var(--expense); }

.summary-label {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.summary-amount {
  font-family: 'Kanit', sans-serif;
  font-size: 28px;
  font-weight: 600;
}

.summary-card.balance .summary-amount { color: var(--accent); }
.summary-card.income-card .summary-amount { color: var(--income); }
.summary-card.expense-card .summary-amount { color: var(--expense); }

/* Month Nav */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 24px;
}

.month-nav button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.month-nav button:hover { background: var(--surface3); border-color: var(--accent); }

.month-nav .current-month {
  font-family: 'Kanit', sans-serif;
  font-size: 18px;
  font-weight: 500;
  min-width: 180px;
  text-align: center;
}

/* Main Layout */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

/* Card */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 24px;
}

.card-title {
  font-family: 'Kanit', sans-serif;
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 16px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* Form */
.form-grid {
  display: grid;
  gap: 14px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.form-group.full { grid-column: 1 / -1; }

.form-group label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 600;
}

.form-group input, .form-group select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}

.form-group select { cursor: pointer; }

.type-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.type-btn {
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}

.type-btn.active.income-type {
  border-color: var(--income);
  background: var(--income-bg);
  color: var(--income);
}

.type-btn.active.expense-type {
  border-color: var(--expense);
  background: var(--expense-bg);
  color: var(--expense);
}

.submit-btn {
  background: linear-gradient(135deg, var(--accent), #6366f1);
  border: none;
  border-radius: var(--radius-sm);
  padding: 12px;
  color: white;
  font-family: 'Kanit', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* Chart */
.chart-container {
  position: relative;
  height: 220px;
}

.pie-container {
  position: relative;
  height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Transaction List */
.tx-list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.tx-filter {
  display: flex;
  gap: 6px;
}

.tx-filter button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text3);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Sarabun', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.tx-filter button.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
}

.tx-scroll {
  max-height: 400px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}

.tx-scroll::-webkit-scrollbar { width: 4px; }
.tx-scroll::-webkit-scrollbar-track { background: transparent; }
.tx-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

.tx-item {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  transition: background 0.15s;
  gap: 12px;
}

.tx-item:hover { background: var(--surface2); }

.tx-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.tx-info { flex: 1; min-width: 0; }

.tx-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tx-meta {
  font-size: 11px;
  color: var(--text3);
  display: flex;
  gap: 8px;
}

.tx-amount {
  font-family: 'Kanit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}

.tx-amount.income { color: var(--income); }
.tx-amount.expense { color: var(--expense); }

.tx-delete {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  opacity: 0;
  transition: all 0.15s;
  font-size: 16px;
  flex-shrink: 0;
}

.tx-item:hover .tx-delete { opacity: 1; }
.tx-delete:hover { background: var(--expense-bg); color: var(--expense); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
}

.empty-state .emoji { font-size: 32px; margin-bottom: 8px; }

/* Legend */
.pie-legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 12px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  padding: 4px 0;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-label { color: var(--text2); flex: 1; }
.legend-value { color: var(--text); font-weight: 600; font-family: 'Kanit', sans-serif; font-size: 12px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: var(--shadow);
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 768px) {
  .app { padding: 12px; }
  .header h1 { font-size: 22px; }
  .summary-row { grid-template-columns: 1fr; gap: 10px; }
  .summary-card { padding: 16px; }
  .summary-amount { font-size: 22px; }
  .main-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .pie-legend { grid-template-columns: 1fr; }
}

/* Delete confirm */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.15s;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 340px;
  width: 90%;
  text-align: center;
  box-shadow: var(--shadow);
}

.confirm-box p {
  margin-bottom: 20px;
  font-size: 15px;
}

.confirm-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.confirm-actions button {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-cancel {
  background: var(--surface2);
  color: var(--text);
}

.btn-confirm-delete {
  background: var(--expense);
  color: white;
  border-color: var(--expense) !important;
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>💰 บันทึกรายรับ-รายจ่าย</h1>
      <div class="header-sub">จัดการเงินง่ายๆ ครบจบในที่เดียว</div>
    </div>
  </div>

  <!-- Month Navigation -->
  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <div class="current-month" id="currentMonth"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <!-- Summary -->
  <div class="summary-row">
    <div class="summary-card balance">
      <div class="summary-label">💎 ยอดคงเหลือ</div>
      <div class="summary-amount" id="balanceAmount">฿0</div>
    </div>
    <div class="summary-card income-card">
      <div class="summary-label">📈 รายรับเดือนนี้</div>
      <div class="summary-amount" id="incomeAmount">฿0</div>
    </div>
    <div class="summary-card expense-card">
      <div class="summary-label">📉 รายจ่ายเดือนนี้</div>
      <div class="summary-amount" id="expenseAmount">฿0</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-grid">
    <!-- Left: Form + Bar Chart -->
    <div style="display:flex;flex-direction:column;gap:20px;">
      <!-- Add Transaction Form -->
      <div class="card">
        <div class="card-title">
          <div class="icon" style="background:var(--accent-bg);color:var(--accent);">✏️</div>
          เพิ่มรายการ
        </div>
        <div class="form-grid">
          <div class="form-group full">
            <label>ประเภท</label>
            <div class="type-toggle">
              <button class="type-btn expense-type active" onclick="setType('expense')">💸 รายจ่าย</button>
              <button class="type-btn income-type" onclick="setType('income')">💵 รายรับ</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>วันที่</label>
              <input type="date" id="txDate">
            </div>
            <div class="form-group">
              <label>จำนวนเงิน (฿)</label>
              <input type="number" id="txAmount" placeholder="0.00" min="0" step="0.01">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>หมวดหมู่</label>
              <select id="txCategory"></select>
            </div>
            <div class="form-group">
              <label>รายการ</label>
              <input type="text" id="txName" placeholder="รายละเอียด...">
            </div>
          </div>
          <button class="submit-btn" onclick="addTransaction()">+ เพิ่มรายการ</button>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="card">
        <div class="card-title">
          <div class="icon" style="background:rgba(34,211,238,0.12);color:var(--cyan);">📊</div>
          รายรับ-รายจ่าย รายเดือน
        </div>
        <div class="chart-container">
          <canvas id="barChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Right: Pie Chart + List -->
    <div style="display:flex;flex-direction:column;gap:20px;">
      <!-- Pie Chart -->
      <div class="card">
        <div class="card-title">
          <div class="icon" style="background:rgba(244,114,182,0.12);color:var(--pink);">🍩</div>
          สัดส่วนรายจ่าย
        </div>
        <div class="pie-container">
          <canvas id="pieChart"></canvas>
        </div>
        <div class="pie-legend" id="pieLegend"></div>
      </div>

      <!-- Transaction List -->
      <div class="card">
        <div class="tx-list-header">
          <div class="card-title" style="margin-bottom:0;">
            <div class="icon" style="background:rgba(251,191,36,0.12);color:var(--yellow);">📋</div>
            รายการ
          </div>
          <div class="tx-filter">
            <button class="active" onclick="setFilter('all',this)">ทั้งหมด</button>
            <button onclick="setFilter('income',this)">รายรับ</button>
            <button onclick="setFilter('expense',this)">รายจ่าย</button>
          </div>
        </div>
        <div class="tx-scroll" id="txList"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none;">
  <div class="confirm-box">
    <p id="confirmMsg">ลบรายการนี้?</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">ยกเลิก</button>
      <button class="btn-confirm-delete" id="confirmBtn">ลบ</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const CATEGORIES = {
  expense: [
    { id: 'food', name: '🍜 อาหาร', color: '#fb923c' },
    { id: 'transport', name: '🚗 เดินทาง', color: '#22d3ee' },
    { id: 'shopping', name: '🛍️ ช้อปปิ้ง', color: '#f472b6' },
    { id: 'housing', name: '🏠 ที่พัก/ค่าเช่า', color: '#818cf8' },
    { id: 'utilities', name: '💡 ค่าน้ำ/ไฟ/เน็ต', color: '#fbbf24' },
    { id: 'health', name: '🏥 สุขภาพ', color: '#34d399' },
    { id: 'entertainment', name: '🎮 บันเทิง', color: '#a78bfa' },
    { id: 'education', name: '📚 การศึกษา', color: '#60a5fa' },
    { id: 'personal', name: '💄 ของใช้ส่วนตัว', color: '#fb7185' },
    { id: 'other_exp', name: '📦 อื่นๆ', color: '#9ba0b4' },
  ],
  income: [
    { id: 'salary', name: '💼 เงินเดือน', color: '#34d399' },
    { id: 'freelance', name: '💻 ฟรีแลนซ์', color: '#22d3ee' },
    { id: 'invest', name: '📈 การลงทุน', color: '#fbbf24' },
    { id: 'bonus', name: '🎁 โบนัส', color: '#f472b6' },
    { id: 'other_inc', name: '💰 อื่นๆ', color: '#a78bfa' },
  ]
};

const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const SHORT_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ===== STATE =====
let transactions = JSON.parse(localStorage.getItem('txns') || '[]');
let currentType = 'expense';
let currentFilter = 'all';
let viewDate = new Date();
let barChart, pieChart;

// ===== INIT =====
function init() {
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  updateCategorySelect();
  updateAll();
}

// ===== HELPERS =====
function save() { localStorage.setItem('txns', JSON.stringify(transactions)); }
function fmt(n) { return '฿' + Number(n).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getCatInfo(type, catId) {
  const list = CATEGORIES[type] || [];
  return list.find(c => c.id === catId) || { name: catId, color: '#9ba0b4' };
}

// ===== TYPE & CATEGORY =====
function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.type-btn.${type}-type`).classList.add('active');
  updateCategorySelect();
}

function updateCategorySelect() {
  const sel = document.getElementById('txCategory');
  sel.innerHTML = CATEGORIES[currentType].map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

// ===== ADD TRANSACTION =====
function addTransaction() {
  const date = document.getElementById('txDate').value;
  const amount = parseFloat(document.getElementById('txAmount').value);
  const category = document.getElementById('txCategory').value;
  const name = document.getElementById('txName').value.trim();

  if (!date || !amount || amount <= 0) {
    showToast('⚠️ กรุณากรอกข้อมูลให้ครบ');
    return;
  }

  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    date, amount, category, name: name || getCatInfo(currentType, category).name.replace(/^.+\s/, ''),
    type: currentType
  });

  save();
  showToast('✅ เพิ่มรายการสำเร็จ');
  document.getElementById('txAmount').value = '';
  document.getElementById('txName').value = '';
  updateAll();
}

// ===== DELETE =====
function confirmDelete(id) {
  const overlay = document.getElementById('confirmOverlay');
  overlay.style.display = 'flex';
  document.getElementById('confirmBtn').onclick = () => {
    transactions = transactions.filter(t => t.id !== id);
    save();
    closeConfirm();
    showToast('🗑️ ลบรายการแล้ว');
    updateAll();
  };
}

function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }

// ===== MONTH NAV =====
function changeMonth(delta) {
  viewDate.setMonth(viewDate.getMonth() + delta);
  updateAll();
}

// ===== FILTER =====
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tx-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ===== GET MONTHLY DATA =====
function getMonthTxns(y, m) {
  return transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });
}

// ===== UPDATE ALL =====
function updateAll() {
  const y = viewDate.getFullYear();
  const m = viewDate.getMonth();
  document.getElementById('currentMonth').textContent = `${THAI_MONTHS[m]} ${y + 543}`;

  const monthTxns = getMonthTxns(y, m);
  const totalIncome = monthTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const totalExpense = monthTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const allIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const allExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

  document.getElementById('balanceAmount').textContent = fmt(allIncome - allExpense);
  document.getElementById('incomeAmount').textContent = fmt(totalIncome);
  document.getElementById('expenseAmount').textContent = fmt(totalExpense);

  renderList();
  renderBarChart(y);
  renderPieChart(y, m);
}

// ===== RENDER LIST =====
function renderList() {
  const y = viewDate.getFullYear();
  const m = viewDate.getMonth();
  let txns = getMonthTxns(y, m);
  if (currentFilter !== 'all') txns = txns.filter(t => t.type === currentFilter);
  txns.sort((a, b) => new Date(b.date) - new Date(a.date));

  const el = document.getElementById('txList');
  if (!txns.length) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">📭</div>ยังไม่มีรายการในเดือนนี้</div>`;
    return;
  }

  el.innerHTML = txns.map(t => {
    const cat = getCatInfo(t.type, t.category);
    const d = new Date(t.date);
    const dateStr = `${d.getDate()} ${SHORT_MONTHS[d.getMonth()]}`;
    return `
      <div class="tx-item">
        <div class="tx-icon" style="background:${cat.color}18;color:${cat.color};">${cat.name.split(' ')[0]}</div>
        <div class="tx-info">
          <div class="tx-name">${t.name}</div>
          <div class="tx-meta"><span>${dateStr}</span><span>${cat.name.split(' ').slice(1).join(' ')}</span></div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
        <button class="tx-delete" onclick="confirmDelete('${t.id}')" title="ลบ">✕</button>
      </div>`;
  }).join('');
}

// ===== BAR CHART =====
function renderBarChart(year) {
  const ctx = document.getElementById('barChart').getContext('2d');
  const incomeData = [], expenseData = [];

  for (let m = 0; m < 12; m++) {
    const txns = getMonthTxns(year, m);
    incomeData.push(txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0));
    expenseData.push(txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0));
  }

  if (barChart) barChart.destroy();
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: SHORT_MONTHS,
      datasets: [
        { label: 'รายรับ', data: incomeData, backgroundColor: 'rgba(52,211,153,0.7)', borderRadius: 6, barPercentage: 0.6 },
        { label: 'รายจ่าย', data: expenseData, backgroundColor: 'rgba(248,113,113,0.7)', borderRadius: 6, barPercentage: 0.6 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#64748b', font: { family: 'Sarabun', size: 12 }, boxWidth: 12, padding: 16 } },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#fff',
          bodyColor: '#fff',
          titleFont: { family: 'Sarabun' },
          bodyFont: { family: 'Kanit' },
          callbacks: { label: c => `${c.dataset.label}: ${fmt(c.raw)}` }
        }
      },
      scales: {
        x: { ticks: { color: '#94a3b8', font: { family: 'Sarabun', size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#94a3b8', font: { family: 'Sarabun', size: 11 }, callback: v => v >= 1000 ? (v/1000)+'k' : v }, grid: { color: 'rgba(226,230,238,0.7)' } }
      }
    }
  });
}

// ===== PIE CHART =====
function renderPieChart(year, month) {
  const ctx = document.getElementById('pieChart').getContext('2d');
  const txns = getMonthTxns(year, month).filter(t => t.type === 'expense');

  const catTotals = {};
  txns.forEach(t => { catTotals[t.category] = (catTotals[t.category] || 0) + t.amount; });

  const entries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, e) => s + e[1], 0);

  const legendEl = document.getElementById('pieLegend');

  if (!entries.length) {
    if (pieChart) pieChart.destroy();
    pieChart = null;
    legendEl.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--text3);padding:20px;font-size:13px;">ไม่มีรายจ่ายในเดือนนี้</div>`;
    return;
  }

  const labels = entries.map(e => getCatInfo('expense', e[0]).name);
  const data = entries.map(e => e[1]);
  const colors = entries.map(e => getCatInfo('expense', e[0]).color);

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 3, borderColor: '#ffffff', hoverOffset: 8 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#fff',
          bodyColor: '#fff',
          titleFont: { family: 'Sarabun' },
          bodyFont: { family: 'Kanit' },
          callbacks: { label: c => `${fmt(c.raw)} (${((c.raw/total)*100).toFixed(1)}%)` }
        }
      }
    }
  });

  legendEl.innerHTML = entries.map(([catId, val]) => {
    const cat = getCatInfo('expense', catId);
    const pct = ((val / total) * 100).toFixed(1);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${cat.color}"></div>
      <span class="legend-label">${cat.name}</span>
      <span class="legend-value">${pct}%</span>
    </div>`;
  }).join('');
}

// ===== START =====
init();
</script>
